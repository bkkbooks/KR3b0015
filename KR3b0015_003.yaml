body:
  text: 守城録卷三湯璹德安守禦録上王在党忠冦德安二十日引去靖康元年十二月二十一日羣賊王在党忠閻僅薛廣等攻陷隨州守城陸德先以下俱逃或盡室遭虜遂犯德安府知安陸縣事陳規先被差部押縣兵赴京行至信陽郡盜梗路二十八日承府牒抽回赴府捍禦二十九日還至應山縣七里河賊夥閻僅千餘人在寮子市置酒張樂邀截歸路二年正月初一日規率同部押官知應城縣宋理應山縣丞權縣事夏翬各以所部弓手土軍召募人合五七百餘人結甲定安陸縣弓手節級馬立廣冕召募人雷智和管界巡檢寨土軍劉允應城縣弓手節級李吉三州寨土軍向吉應城縣弓手節級竹清三縣巡檢寨土軍楊素凡八人徑領衆入應山縣掩殺羣賊僅等大敗餘黨潰散投入王在夥中王在寨去府百餘里規尋得路將所部兵到府時知德安府李公濟已往諸處招集人兵通判周子通先往諸縣起發民兵及士曹張顔恱因賊至驚死司録士曹局務官安陸縣丞簿尉皆緣故搬家遁去初三日城中官吏軍民推規權領府事初六日通判周子通回府當日規交府事與通判凖府牒規權通判仍充統領守禦人兵迎敵規遂措置修築城壁召募騰勇刷差軍兵勾抽保甲隄防守禦十一日知府李公濟回更不交割牒府乞折資監當即日離任去十三日王在人馬入府界劫掠十四日權兵曹應城主簿田縡出城逃走十五日賊遊騎數十人至城下與城上人相射至晚回寨十六日王在領馬步五千餘人著顔色衣各執弓箭背牌及板門扇來圍城攻諸門委管界巡檢胡善三州都巡檢張惟德出戰二人先走匿於孝感縣九嵕山寺是日賊與守禦人相射申後賊退往府東天慶觀泰山廟等處下寨十七日賊又攻城賊首王在及近上首領多在齊安門外規與權府周子通城上呼賊與語喻以禍福賊暫退是晚周子通驚中風疾十八日牒府在假本府止有規及安陸縣尉董貽兵馬都監趙令戣監酒稅務趙康輔四員而已於是官吏軍民又推規權領府事規以城危急不敢辭遂糾率官吏軍民多方措置盡死堅守是日賊搬積柴草欲燒齊安門守門人於未到十餘步先放火箭爇之賊又用松柏長木及大竹雲梯五十座齊力並進城上人用磚石及連䕸棒長鎗弓弩拒退良久遣人縋城毁斫雲梯二十日賊列騎成陳逼城驅人擡鵝車洞子樓座用牛皮并氊包漫攻齊安門被城上人及城門上門空處先以撞竿托叉抵定次用搭鈎鈎去洞子上皮氊墜大石及磚石摧擊又用弓弩箭射其賊退去續次下城焚燒毁斫盡絶賊又進雲梯約髙二丈各有梯道四圍用綿被并氊皮包裹煙火箭鑿不可侵近約用四五十人擡擁向城被守城人先以長竹併力撞衝雲梯傾倒壓死賊數人次磚石弓弩箭射擊賊人走退是日賊又進天橋約髙二丈濶一丈以木長四丈餘可以並行數人如城之幔道用以登城賊衆數十人擡以向城被城上人用弓弩磚石射擊致擡者止於十步外不能前進又於諸攻具之外列大炮十餘座四面向城飛石擊守城人其城上人存身向箆籬以避之城下人向木柵存身以避之致其炮並不曽傷守城之人是日賊又前以步後以騎列陳向城城內多設炮座城上人看覷賊近逺向著諭與定炮人向賊放擊發而多中其賊逺退只於城東十餘處下寨自是每日遣人至城下相射鬭敵及四散燒劫略無退意三十日早又有党忠人馬五六千人齊到城下著雜色衣與王在兩夥同來爭先攻擊四面環繞風水不通規與機宜閻孝周登城招王在諸酋至城下開說大義薄許犒設賊意稍解又招賊大將蔣宣入城置酒欵說禍福却令出城二月初三日王在引兵去党忠人馬仍用洞子火匱齊攻城門被城上人用撞竿磚石弓弩箭拒退當日景陵門下打死賊五人并炮打殺鼓賊一名是夜三更賊乘暗忽由四邊停雲梯上城被城上人用槍及磚石刺打下又攢火炬燒望雲朝天齊安等門又用長鈎鈎城上人又用竹木縳荻把作火炬長二丈列二三百炬如火山向城門及燒城上竹城箆籬並被守城人併力用撞竿托叉抵拒及用磚石弓弩箭射并放炮石如此鬭敵自三更至曉方暫退初四日早規見攻擊危急賊不肯逺退遂㸃第一隊第三隊人兵開朝天門出乘賊不備分頭掩擊党賊敗走即收兵入門却開景陵門令第二第四隊并第一第三併力出門掩殺其賊大敗乘勢趕逐除斬獲生擒外逼入溳河死者不知其數餘黨遂潰是日奪到旗六十三面鼓四十面鉦五面槍刀二十三條牌十五面甲七連弓三張弩二枝牛五十二頭馬九十匹騾五頭驢十二頭自正月十五日至二月初四日凡攻圍二十日今考具措置於後一踏逐過往寄居官進士勇敢者借補官資差攝職事一選募有心力百姓分布諸門上城禦敵及分認地頭譏察姦細及催督修城人夫工役一差使院典級黃謹等行軍期司専一行遣防城守禦修城文字及各帶器甲隨規巡城一選差安陸縣吏楊玠等提轄防城軍民弓手日夜巡邏及催促添修城壁一差撥軍民弓手分作四隊及選差弓手節級長行每二人共管押一隊內馬立馬政管押四百一十五人李全許進管押三百一十六人郭政田全管押三百六十五人劉德李清管押三百五十人各分布城下凖備出戰一差撥有心力騰勇保正隊頭黃夀等部領保甲人兵一十六隊計八百餘人凖備出戰一招集到茶客楊政等自召募人凖備出戰并僧雷知和自召募僧行百姓二十六人殺賊一城上極是尖狹有不及一尺濶者其上不能容立一人及無乳頭尋於城上裏邊用鍬钁直削向下三尺以代乳頭下城鐙道添造竹木棚棧令人坐立可以施放弓箭等器械守禦一城壁卑矮遂於城外添立竹柵間安箆籬外可以遮隔弓箭內可以施用兵仗於土城之上又立竹城一層一城有極卑薄處遂於城內腳下離城三尺别立木柵一重約髙一丈五尺門空五寸立木一根於城稍低薄處無不周遍係於土城之內又立木城一重於木城之外每兩步立一人與城上人更互上下守禦一城門薄怯損敝尋於門外别立小門一重各以氊皮釘裹上開門頂空隙以備墜石及下施兵仗又於門內兩邊栽立枋木作鹿頂約髙一丈五尺長五十步其中路濶六尺至盡處用木拒馬四五重閉定每五寸立木一根兩邊木外每步立一人持長槍一城上以千字文為號每步一字每字一人以五人為一甲十甲為一隊互相統制分布城上又以在城火夫客户置籍結甲上城守禦一選人兵一百五十人令保正副六人甲頭二人管押統領晝夜准備應援如東壁有報警急即提兵東應西則西應自攻圍二十餘日每有警急無有不至者一於賊退之後其未逺止在四外側近圍繞之中寅夜偷工開壕築城仍命工人計城厚薄而中分之先併力以築其表髙及尋丈度不可以驟登則又併力以築其裏適相當然後增築以成之內具畚鍤以督役外荷戈矛以備警起五邑之夫萬人竭作不淹時而畢一城壁長八百八十二丈髙二丈五尺上濶一丈六尺底濶三丈七尺五寸及於城壁外開築城壕繞城壕塹計長七百八十八丈上濶三丈底濶一丈八尺深一丈五尺張世李孝義冦德安四日引去建炎元年九月二十二日李孝忠餘黨張世李孝義賊馬五萬餘衆已破襄陽荆門軍荆南府郢復州遂冦德安府先行文字稱欲就招安一面擺拽兵馬環繞府城本府以方議招未敢禦敵是夜五更一㸃忽同時發喊雲梯火炮弓弩箭鑿攻城勢焰凶猛本府官吏軍民以死禦敵至二十三日巳時賊始退是日矢石殺死賊兵三百餘人賊拽尸以去沉之河及積薪焚之被傷一千餘人諸門奪下雲梯七十餘座二十四日夜賊兵又乘暗至西北兩門以城上肅靜隄防不能下手夜半引去其時有御營使司同都統制范瓊討捕李孝忠等領兵在府北纍遣至城下應援掩擊不下二十五日拔寨南去楊進冦德安一十六日引去建炎二年三月初四日羣賊楊進號沒角牛領衆至本府城外四面下寨遣人齎文字來稱有衆一百五十萬馬三萬五千餘匹自京東登萊沂密濰淄徐等州前來逐州官員盡皆勦殺本府視賊寨約有十餘萬人馬三千餘匹是日略來脅城不多時各退歸寨初五日以後朝暮繞城矢石所不及處擺布人馬三五重更畨替換又於前分布攻城人馬大振金鼓喝喊馬軍在後用刀鎗擁逼步人并力攻城一齊發弓弩及神臂弓箭鑿射城上人并持雲梯四面奔城被城上守禦人弓弩箭鑿炮石磚石雨下賊並不曽得利城中時出兵衝殺賊遂少退四五日後賊復添立攻具髙起望樓下瞰城中并造戰柵對樓洞子用牛皮包漫又用夾布作遮箭幕約髙三丈箭鑿皆不能害又立大炮攻具日增夜遣人搬柴草向羊馬城并城門放火亦被守禦人救護撲滅并矢石禦退賊不得利十七日增望樓四座大炮五十餘座洞子一百餘個遮箭布幕三十餘座大戰柵一座對樓一座及雲梯不知其數其戰柵約髙二丈四方各濶一丈六尺有餘先用人裏外擡夯向城被城上人用弓弩箭鑿并炮先射打退擡夯人及打得傾側使用不得棄下退去其對樓約髙四丈濶一丈五尺有餘作五層縳木梯斜上髙過如城其勢太重推拽難行兼被城上守禦人施放矢石射打推拽人莫能近前其餘遮箭幕盡被炮石打得碎破其洞子凑城又被城上墜下柴草積火焚燒皆不得近前其炮亦被城內放炮多打殺定炮人其賊凡所立攻具一一施用數日皆不能傷城上人自初四至十九日計十六日逐戰鬭殺傷賊數多賊知城不可攻二十日方遣人至齊安門下髙聲呼城上人且不要放箭防禦教來打話當時城上人問打甚話其人言恁也不出來共唵厮殺我也打恁城不破有招安官來唵只待要些犒設受招安城上人答待恁受招安了與恁犒設其人便去至晚有一人著紫道服領二十餘人持東京留守司請召旗一面向城隔壕與城上人說話稱是東京留守宗元帥使臣成忠郎王申元帥遣來招安楊防禦髙聲讀示宗元帥咨目并劄子言楊防禦今日方肯受招安待問本府要些犒設并出劵往東京本府許之二十一日送犒設在城外其楊進領人親到齊安門下收受致謝而去是日楊進領衆起離向信陽軍前去契勘楊進自三月初四日圍城攻具甚盛被城上人施用弓弩箭鑿炮石磚石射打死損賊人數多及出兵衝殺入壕淹死者五十餘人及於壕內撈漉到賊尸於沿身搜到借補使臣文帖四道及被虜人回稱楊進被箭射著頭又被磚炮打著額倒卧纍日後起來嗔在邊將官不來扶救斬之又聽得楊進言自出京以來不曽折了人却到這裏折却許多又折了强將四員見得楊進計窮力盡方受招安孔彥舟三次冦德安皆不克引去建炎二年十二月二十八日有北來一項羣賊數萬人稱是單州團練使郢州鈐轄孔彥舟在黃州麻城縣作過至三年正月初七日賊至黃州皆剃頭辮髮作金人裝束是夜填塞壕塹用雲梯及牛皮洞子安立炮座攻圍黃州城及肆掠黃陂縣并侵犯德安府孝感縣界本府慮賊來犯城遂分布官吏軍民於諸門地分嚴行隄備其賊迤邐至孝感縣東舊鎮殺人放火劫掠財物二十四日到環河鎮殺傷已受范瓊招安下吳錫人馬二十六日到府東十八里下寨稱是武經大夫榮州團練使東平府兵馬鈐轄京東西路統制軍馬孔彥舟二十七日領全軍數萬至府城下四外占岡擺布搭立施設弓箭射城上守禦人被城上人齊發炮石弓弩賊衆不敢近當夜遁走向隨州前去至閏八月十一日復自光州回至本府應山縣作過再占據隨州九月初一日分遣賊騎侵犯本府圍城本府乘時出兵掩殺初八日賊遁去復回占隨州十一月初一日彥舟又自隨州領人馬至本府城下圍繞劄寨初八日大隊併至攻城被本處守禦人施放弓弩箭鑿炮石禦敵至晚退却止在城外初九日拔寨南去占據復州又往占據荆南府正月二十七日攻城當夜引去初九月初一日攻城初八日引去十一月八日攻城次日引去董平冦德安三萬人即日敗去建炎三年三月羣賊董平部領人馬至應山縣稱勤王兵沿路劫掠四月初四日夜掩劫孝感縣官吏居民逃走有不及者悉為驅虜及燒盡一縣官私屋宇是日在本縣東舊鎮劄寨分遣賊徒剽掠本府差撥人兵六頭項前去掩殺董平起離取唐州去九月十二日有宣撫處置使司差知信陽軍武經郎孫璘到本府差兵護行至信陽交割至十二月二十日董平破信陽璘僅以身脫其家并官屬皆沒於賊平差占據信陽自往唐州大義山劄寨令隨唐信陽三郡人户送納糧草并收逐處稅錢四年三月十六日平領三萬餘衆到本府本府差正將辛選發兵往應山界迎敵戰數合賊大敗走殺賊千餘人鉦鼓旗槍弓箭器械輜重棄之滿道平尋走往西京界為鄉村把隘人所殺
