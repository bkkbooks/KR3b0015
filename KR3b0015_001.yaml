body:
  text: 守城録卷一陳規靖康朝野僉言後序靖康丙午規以通直郎知德安府安陸縣事丁未春正月羣盜王在等犯德安府時郡將闕規攝府事賊來攻城規在城上與賊語問何因到此賊言京城已為金破規獨念都城之大壕塹深濶城壁髙厚實龍淵虎壘况禁旅衛士百萬雖金人乘我厄運一時強盛亦何能破殆不足信二月四日賊遁遣人詣都城奏功還乃知京城果為敵陷徒深痛切但不知城破之所以然爾又恨當時不得身在圍城中陪守禦之士以效綿薄紹興己酉春三月朝廷既復河南規自祠官被命知順昌府夏五月到官行及期年暇日會同僚語及靖康之難汝隂令云嘗收東齋雜録一編中有靖康朝野僉言具載金人攻城始末規得之熟讀痛心疾首不覺涕零嗟乎治亂強弱雖曰在天有數未有不因人事得失之所致也揚雄所謂天非人不因人非天不成靖康京城之難若非人事之失則天亦不得而為災規不揆至愚竊觀金人攻陷京城朝廷大臣與將吏官帥應敵捍禦之失雖既往不咎然前車之覆後車之戒事有補於將來不可不備論也朝廷欲再援太原大臣以為中國勢弱敵勢方強用兵無益宜割三鎮以賂之殊不知勢之強弱在人為我之計勝彼則強不勝彼則弱若不用兵何術以壯中國之勢遏敵人之強用之則有強有弱不用則終止於弱而已強者復弱弱者復強強弱之勢自古無定惟在用兵之人如何耳河東宣撫使統兵十七萬以援太原又招河東義勇禁兵五萬共兵二十二萬皆敗績致太原陷於敵非兵不多蓋用兵之失也其所以失者兵二十二萬直行而前先鋒遇敵者有幾一不勝而却與其後大兵皆却宜乎不能援也有識者觀之不待已敗而後知其不能援也殊不知攻城者分攻城兵備戰兵運糧兵扼援兵若兵不多則攻必不久而速退又不待其援也假使當時往援者將良得計雖無兵二十二萬只十萬亦可以必援又無十萬只五萬亦可以優為之援也又不五萬至其下亦有可援之理且以五萬為率若止分為五十將留十將護衛大將兼備䇿應內分三兩將詣扼援兵前廣張兵勢牽制扼援之兵以二十將分地深入敵境綿亘可布三五十里不知敵人用兵多少便能盡害以二十將周圍行偏僻小路尋求鄉導多遣逺探向前設伏伺望敵人打糧出兵多則退之少即擒之但絶其糧道不必深入直扺城下其敵自退又且兵既分遣則人力並用假令數將失利其大兵必不至於一齊敗衄潰散為盜京城之難其源在於援太原之失利也尼瑪哈攻太原之夀陽夀陽城小而百姓死守凡三攻殘敵之衆萬人而竟不拔此必守城人中有善為守禦之䇿者僉言以為城小而百姓死守者非也攻城者有生有死善守者有生無死夀陽之人可謂善守而不得謂之死守又或云城小而堅者亦非也若城太小矢石交通善守者亦難以設險施䇿規以為城愈大而守愈易分假數作限隔則易守若已先䇿定險備設使敵欲登城縱令登城已登即死敵欲入城引之入城已入即死今夫百里之城內有數步之地敵人登之守城之人便自甘心伏其城拔乞命於敵者非攻之善乃守之不善也九月安炮於封丘門外大炮數百座皆在門外敵至不收遂為金人所得咸謂金人得攻城之具規以為城破亦不在此有善守者假使更資炮數百座亦必無害在於禦炮之術善不善也統制官辛康宗以敵去城逺止兵不得發箭止之甚善百姓鼓衆擊殺此亦見其自亂素治之術失也敵先採濕木編洞屋以生牛皮蓋其上戴之令人運土木填濠欲進攻城守城人若得計則城內先施大炮碎之亦可用單梢炮取逺至二百五十步外者制其首領用衆之人蓋益州郡舊有朝廷所降守禦册定格單梢炮上等逺至二百七十步中等二百六十步下等二百五十步不知京城當時倉卒之際此格用與不用若人稍不究心則下等二百五十步亦莫能及若能究心則二百七十步過之甚易又以小炮禦近衆其小炮每十人已上不過十五人施放一座亦可以致數十步勿謂小炮不能害物中人四肢則四肢必折中腰以上則人必死中馬亦然又况大炮每放一炮小炮可放數炮兼小炮不必用石以重三四斤泥團為之泥團之利亦博不獨放時易得無窮放去中人人必死傷不中則泥團為炮擊破不致反資敵用若要摧毁攻械則須用大炮及石金人攻城用大炮蓋欲摧壞城樓守城者欲摧毁敵人攻械大炮與小炮齊用縱敵在城外伐大木為對樓雲梯火車等攻械可以破盡金人廣列壘石炮座尋碑石磨蓋石羊虎為炮欲攻之所列炮座百餘飛石如雨擊守城之卒死傷日不下一二十人此非攻城之能蓋守禦官一時失計耳茍守禦官得計止令卒近女頭墻坐立城外炮來髙則於女頭墻上過低則打中女頭墻擊破在外無緣中人一卒亦不至於死傷又豈有死傷日不下一二十人者惟女頭墻稍加髙厚則愈加安堵又須先用稍大木造髙一丈長一丈濶一丈上下外直裏斜外密裏稀洞子外密處以大麻繩橫編如荆竹笆相似以備炮石衆多攻壞女頭墻即於兩邉連珠進洞子向前以代女頭若此則炮石縱大數多未易損壞間有損者即逐旋抽換假令只如此禦捍則炮石亦何能害人已可必其無虞也敵以雲梯對樓攻東水門其間禦捍有設重樓獲勝者固甚善也又恐人在重樓之上愈招矢石又攻東門守禦官守具亦備對樓雲梯至每以木衝倒仆死者無數此亦竒䇿然持衝木人與對樓上人相對不免互傷亦非全勝金人填壕橋成運對樓過濠攻城城下列炮座二百餘所七梢炮撒星炮座石炮並發又以強弩千餘助之城上矢石如雨使守禦卒不能存立然後推對樓使登城每對樓上載兵八十人一對樓得城則引衆兵上此金人攻城之方也其炮大數多矢石齊發只前説女頭墻次備以洞子皆可隔盡矣對樓登城每一對樓果能載兵八十人樓廣不過二丈當靣立得幾人與守城人接戰者不過十數人而已假令八十人盡用力施設五對樓止四百人此外必無伏兵亦無竒兵樓髙須及五丈乘髙而來其迹亦自甚危自履危地來與城上立平地人接戰勝負人人可以自決若守城者於此不勝則交戰於平田廣野之地不知其敗若何况對樓填平壕上惟可以直進直退必不能於城下橫行守人備禦不過止備對樓所占之地假使有十對樓所占地步數亦不多不獨接戰可以必勝縱兵上城獲全勝者術亦多矣不思則弗得也敵用雲梯止要登城每座雲梯須十餘人可以負荷到城城上禦之亦難向前來縱不禦之使敵倚城登梯上至城頭少不死者何以致之於女頭墻裏鵲臺上靠墻立排叉木每空闊三四寸一根通度槍刀向上髙出女頭墻五六尺敵至女頭墻上必為排叉木隔住背後乘空守禦人於木空中施槍刀刺擊豈有刺擊不下者下而不死者鮮矣閏十一月二十四日再攻推對樓五座盛矢石來城上以竿衝倒三座城上士卒爭持草以焚之對樓木多而草盛火熾火乘南風遂引燒城上樓子三座對樓既倒在城外必不能却回亦不能再起自是堵住敵人攻械來路可以置而不問焚者失也縱不引燒城樓止燒了敵人對樓亦是城上人自持草火與敵燒開再進攻械來路此事大失所有再造城樓骨格欲於舊處安立者以理度之自是敵必不容矢石必倍守禦官若能用前説造洞子於闕樓子處兩頭連珠並進不終日決可蔽合權代女頭墻以隔矢石矢石雖愈倍於前亦必無害次於燒了城樓處兩頭橫直深埋排叉木以防敵急登城上分甲兵兩向攻打城裏從下斜築向上至城靣外垠向下陡峻次於城裏腳下取土為深壕離壕三五丈築月城圍之使敵乘對樓到城如不下對樓上城却回則已若上城必自立不得倒入壕內無不死者如此一挫必罷攻退兵乃守禦之人失之以致城陷豈不痛哉凡攻守之械害物最重其勢可畏者莫甚於炮然亦視人之能用與不能用耳若攻城人能用而守城人不能禦之則攻城人可以施其能若守城人能用則攻城人雖能者亦難施設竊聞金人用炮攻城守禦人於城上亦嘗用炮城面地步不廣必然難安大炮亦難容數多雖有炮臺炮臺地步亦不甚廣又炮才欲施放敵人在外先見必須以衆炮來擊又城上炮亦在髙處自然招城外敵人用炮可以直指而擊之以此觀當時守禦之人其不能用炮也明矣假令當時於城裏腳下立炮仍於每座炮前埋立小木為衣敵人在外不見立炮所在雖有能用炮者何由施設或謂炮在城裏炮手不能見得城外事無由取的每一座炮别用一人於城上專管城裏一座外照物所在裏照炮梢與外物相對即令施放少偏則令炮手略少那腳太偏則就令拽炮人擡轉炮座放過則令減人或用炮稍大者不及則令添人或用炮稍小者照料得一炮打中後炮少有不中又城裏立炮可置數多守禦人用炮若止能如此則攻城人用炮何能為也築城之制城面上必作女頭墻女頭中間立狗腳木一條每兩女頭中挂搭箆籬惟可以遮隔弓箭於炮石則難以遮隔若改作平頭墻不用箆籬只於近下留品字方空眼與女頭相似亦甚濟用或問何以備禦城外腳下自有馬面墻兩邉皆見城外腳下於墻頭上墜下害敵之物敵人初到城下觀其攻械勢恐難遏宜便於城裏腳下取土為深闊裏壕去壕數丈再築裏城一重對舊城門更不作門却於新築城下緣裏壕入三二里地新城上開門使人入得大城直行不得須於裏壕垠上新城腳下繚繞行三二里方始入門若此則假使敵善填壕止不過填得外壕必不能填得裏壕若由門入城須行新城腳下裏壕垠上新城上人直下臨敵何物不可施用正是敵人死地必不敢入由正門入城尚且不敢則豈肯用命打城但只如此為備則敵兵雖多攻械百種誠可談笑以待之又况京師舊城亦自可守若逐急措置便可使勢如金湯有不可犯之理兼京城之內軍兵百姓金銀粟帛計以億兆之數亦莫能盡若令竭力修作不獨添築一城一壕可不日而成假令添築城壕數重亦不勞而辦重城重壕既備然後招敵人入城議事彼若見之必不攻而自退俗諺云求人不如求己古人云上䇿莫如自治又事貴制人不貴制於人皆此之謂也京城周圍地約一百二十里聞當時敵在城外諸門多閉有以土實者正開三兩門通人出入如此乃是自閉生路而為敵開其生路也為守之計不獨大啓諸門仍於兩門之間更開三兩門使周圍有門數十座齊開於城內運土出外填壕作路使戰兵出入無至自礙城上覘望敵人空隙稍得便處即遣兵擊殺或夜出兵使敵在外所備處多晝夜備戰無有休息彼自不能久攻兼既城內創開城門自運土填壕欲為出兵計則其在外填壕欲入之計不攻自破然所以敢自創開城門出填壕者非謂敵兵可欺蓋恃其自於城內設險已備引敵入城而敵必死耳晉王浚遣都護王昌及鮮卑段疾陸眷末柸等部五萬之衆以討石勒諸將皆勸勒固守以疲冦獨張賔孔萇以為可速鑿北壘為突門二十餘道勒即以萇為攻戰都督造突門于北城鮮卑入屯北壘勒候其陳未定躬帥將士鼓譟于城上會孔萇突諸門伏兵俱出擊之生擒末柸疾陸眷等衆皆奔散萇乘勝追擊枕尸三十餘里獲鎧馬五千匹此乃守中有攻可謂善守城者也後之守城者何憚而不法歟州郡城池之制人皆以為盡善城上有敵樓而敵人用大炮摧擊城髙數丈而敵人用天橋鵝車對樓幔道雲梯等攻具登城據其城池之制作可以自謂堅固前古所未有奈何敵人攻械之備亦前古所未有故事貴乎仍舊而人憚於改作皆不可必者古人所謂利不百者不變法功不十者不易器以今城池之制觀之雖利不至於百功不至於十然其間有須更改者不可不更改也自古聖人之法未嘗有一定之制可則因否則革也為今之計如敵樓者不可仍舊制也宜於馬面上築髙厚墻下留品字樣方徑及尺空眼以備覘望及設施槍路墻裏近下以細木蓋一兩架瓦棚可令守禦人避寒暑風雨屋在墻裏比墻低下則炮在外雖大而數多施設千萬悉莫能及人壕上作橋橋中作弔橋暫時隔敵則可若出兵則不能無礙宜為實橋則兵出入俱利城門宜迂回曲折移向裏百餘步置不獨敵人矢石不入其舊作門樓處行入一步向裏便是敵人落於陷阱何謂陷阱蓋百步內兩壁城上下臨敵人應敵之具皆可設施又於舊門前橫築護門墻髙丈餘兩頭遮過門三二丈城門啓閉人馬出入壕外人皆不見孰敢窺伺城外腳下去城二丈臨壕垠上宜築髙厚羊馬墻髙及一丈厚及六尺墻腳下亦築鵲臺髙二三尺闊四尺鵲臺上立羊馬墻上亦留品字空眼以備覘望及通槍路亦如大城上女頭墻墻裏鵲臺上栽埋排叉木以備敵填平壕塹及攻破羊馬墻至城腳下則敵與羊馬墻內兩邉受敵頭上大城向下所施矢石即是敵當一面而守城人三面禦之羊馬墻內兵賴羊馬墻遮隔壕外矢石是羊馬墻與大城係是上下兩城相乘濟用使敵人雖破羊馬墻而無敢入者故羊馬墻比大城雖甚低薄其捍禦堅守之效不在大城之下也又羊馬墻內所置之兵正依城下寨以當伏兵不知敵人以何術可解若此則既有羊馬墻而鹿角木可以不用仍於大城上多設暗門以備遣兵於羊馬墻內出入又羊馬墻腳去大城腳止於二丈不令太逺者慮大城上拋擲磚石難過墻外反害墻內人又不令太近者慮其太窄難以回轉長槍又於大城裏城腳下作深濶裏壕裏壕上向裏度地五七丈可作來往路外築裏城排叉木但多備下敵攻城應敵處用此以設備雖使敵人善攻不足畏也墨翟宋大夫善守禦公輸般為雲梯之械將攻宋墨子見之乃解帶為城以褋為械九設攻城之機墨子九拒之公輸般攻械盡墨子守有餘公輸屈曰吾知所以拒我者以此見攻械者宜乎古人以為䇿之下也夫守城者每見敵人設一攻械而無數䇿以拒之者未之思也規嘗聞孫子曰兵者國之大事死生之地存亡之道不可不察也又以為兵者詭也用無中形詭詐為道故能而示之不能用而示之不用近而示之逺逺而示之近攻其不備出其不意此兵家之勝不可先傳也然而有傳之于衆而逹之于逺有利而無害有得而無失者不可不先傳也嗟乎靖康丙午金人以兒戲之具攻城守禦者一時失計遂致城拔迄及一紀有餘而金人猶不思當時幸勝尚以驕氣相陵規於未知金人攻城設炮之前每見人云金人攻城大炮對樓勢豈可當貴顯言之則怏然而不敢辨衆人言之則亦不敢痛折今既知其詳則豈可不盡曲折剖其所見而言之然用兵之道以正合以竒勝善出竒者無窮如天地不竭如江海千變萬化人孰能窮之今止據金人攻城施設略舉捍禦之䇿至於盡精微致敵殺敵之方雖不憚於文繁而有所謂真不可示人者未之傳也又况雖欲傳之有不可得而傳者矣惟在乎守城之人於敵未至之前精加思索應變之術預為之備耳區區管見輒序於僉言之後紹興十年五月日陳規序
