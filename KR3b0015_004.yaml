  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0015_WYG_004-1a, image: WYG0727/WYG0727-0198a.png}
body:
  text: 守城録卷四湯璹徳安守禦録下趙夀冦徳安三日引去建炎四年五月十二日羣賊趙夀號不忙自黄州領衆數萬餘人至孝感縣界刼掠遣人至本府欲就招安是月有朝奉郎守尚書兵部員外郎福建廣南東西荆湖南北等路撫諭使馮康國到本府守臣陳規白馮乞行招安㑹趙夀亦遣人以書與馮願受招安規復遣人徃夀寨說以撫諭肯行招安之意六月初二日夀領衆至城外是晚馮親出城見夀初三日夀擕數隊入城聽撫諭聖訓謝恩招安了當馮牒夀令權於江州黄州駐劄聽候朝命本府亦支給錢糧犒設訖十二日夀起發至東四十里環河鎮駐劄忽夜遣人馬分頭項於本府八門改換色衣偽作民兵裝束一擁奪門頼諸門守禦素備即時以死捍禦旋増弓弩砲石鬭敵至巳時方退復於箭砲不及處擺布圍城迭来攻打被城上弓弩砲石不歇及遣兵披城出戰三晝夜計窮力盡二十日賊㧞寨南走曹成李宏冦徳安自六月至二月引去建炎四年六月有曹成李宏賊自舒州歴光州信陽至本府衆數十萬布滿諸縣直抵襄随郢州界駐劄三龍河時早禾始熟廣被芟掠本府以賊兵衆盛不輟隄備七月三十日賊衆至城下攻打府城本府一靣施放弓弩箭鑿砲石一靣發兵出外披城鬭敵賊不能破巳時方退八月十四日成衆又至城下本府再發人兵出城迎敵賊復退於近城桐栢廟下立寨分遣騎於八門一二里外立小寨圍困本府不通徃還本府官吏軍民以死捍禦間出兵掩殺每夜遣兵刼擾小寨奪糧入城晝夜相拒六十餘日是時成等人馬實多本府兵極少其勢不敵遂設計謀差人齎公文前去問當成等誘以禍福利害指其自新之路成等始退十月初三日遣人入城商議稱一行兵衆原非為賊止為鄉中不可居止遂前来㝷有糧喫用却䝉朝廷收還招安之後所授官職止乞元来官資湔洗招安之民及齎到成等申狀本府於初五日備録奏聞成等始於十六日復還三龍河大寨仍不住於府城四外燒刼又因本府抄截掩殺之故十一月二十四日復領衆来攻城本府出兵迎敵至午方退五年二月十九日成等領衆起離三龍河徃漢陽軍渡江前去桑仲夏邢尚孫羣賊冦徳安三月引去紹興元年十二月初四日有信陽軍邢舍人尚統領等部領二千餘人至本府城下焚掠本府即時閉門捍禦雖稍退未肯逺去十七日又有隨州孫彪統領人馬三千餘人亦来圍城本府閉門捍禦及遣兵出城戰殺傷百餘人方退亦未肯逺去二賊梗路不通二十日夜賊齊至城下弓弩箭鑿雲梯布牌攻諸門本府官吏軍兵拒敵二十一日早始退離城百步外圍繞是夜信陽軍賊馬前去攻孝感縣不克復回本軍隨州賊馬前去攻復州陷之二年正月二十八日再發人馬兩路前来本府近城四外焚刼本府官吏軍民晝夜上城不曽解甲以死捍禦及時出兵掩殺三月初間始退向隨州去續據忠訓郎權孝感縣韓遹狀准鎮撫使差權縣事踏逐到離舊縣一十里臨溳河地名紫溳就周圍積水為壕創築城壁欲就緒間十二月二十四日有信陽軍賊馬二千餘人自府城来奔本縣先二百人到城北遹即分布守禦發兵迎敵賊敗走五里逢賊大隊至復圍縣城施放弓弩㝷於壕外呼曰憨是信陽大後軍邢舍人尚統制人馬向北打了一百八十座山寨壊了鄧州信陽軍并天目山寨今决要取本縣屯泊人馬就糧贍軍圍至夜只於壕外分布劄寨二十五日賊掠溳河客船載兵入壕及用布牌木牌遮箭擡夯雲梯五十座向前水陸攻縣城被本縣人施弓弩砲石併力捍禦至晚賊退向寨二十六日賊多拽河内船舫五七隻為一絞用大竹絞成竹牌立於船頭旋添船併作浮橋於北壁壕内攻縣城城上弓弩砲齊發敵不能近復拽船泊岸只攻東壁亦被禦退至夜回寨遹恐賊别生計遂親領兵三更出刼賊寨殺賊三百餘人及收到被擄男女五百餘人入城二十七日賊於壕外添砲數座及分布船隻向前攻城至午禦退二十八日又以雲梯向前并力攻城至夜禦退二十九日賊又用船六十餘隻通作一絞用板釘鋪船靣船頭並用竹木布牌兩頭遮箭後立長槍五百餘人撑拽攻西壁勢兇猛遹激勵人兵西門放出戰船十五隻於壕内及城上弓弩砲石齊發至未時賊大敗渰溺無數盡奪所絞船舫其岸上擺立賊兵即時回寨至夜㧞寨遁去李横冦徳安六十五日引去紹興二年六月十三日桑仲餘黨知鄧州李横號九哥哥領襄陽府鄧隨郢州所管軍馬及逐州百姓共約五六千人内正兵約四千人前来徳安府近城下寨大小七十座賊首李横大寨在城西隔河早晚舉平安火諸寨相應遇夜諸寨有警即時舉火每寨各立望樓樓上人執白旗城北東西三面各正視城門門内人出入必先見出稍多即舉旗向門本寨及兩邊連寨人競出掩撲或城内出兵迎敵及刼寨即時諸寨舉旗指示悉来應援城南有望樓四座占髙阜下瞰城内街巷徃来動息皆見之城上守禦人人可數纔見城内稍似擺拽即舉旗諸寨各為備夜於四外更互相應把斷出入之路圍閉府城内外風水不通本府雖不住出兵鬭敵終是兵少難勝亦嘗於城上招到横親近打話諭以禍福横只以本府收藏霍明為辭誣執本府順番必要打城七月初三日五更一㸃城外發喊用弓弩箭射城上人及將雲梯到城搬草擁門火之城上人用弓弩砲石塼石射打不能上城至辰時賊退雲梯六十餘座皆棄下初四日横親領衙兵徃隨州至襄陽府喚木匠鐡匠搬取牛皮繩索及於大洪山取氊及索十餘日回来再造天橋洞子山梢大砲及雲梯等攻城器械八月四日攻具成津至城西南角下寨裝鬭天橋衆填壕一夜平初五日入逺壕内立大砲七座攻打城上人其砲石小者不下十斤大者四五十斤用大木造四脚洞子一個長約二丈濶丈五脊髙丈二以上用濕栢木大椓宻牌牛皮漫之面與兩邊用木椓并厚氊簾其脚髙四尺五寸厚似癡車脚其狀如兩間屋推臨裏壕用大木椓絞成狗脊洞子連接兩行各長五十餘步并厚木板牌二百餘面遮䕶賊人搬運草木塼石填裏壕數日鬭就天橋脚共六隻髙五尺厚薄一如洞子脚長六丈以上濶二丈髙三丈五尺以上近及四丈上濶一丈以上當頭自下至上斜髙向前約一丈以上中下三層當面并兩邊及頂上皆用牛皮厚氊毯被掛搭其天橋底盤上後繋大竹索兩條各長二十餘丈每條百餘人牽拽規暗料賊必是欲以砲打城門并城上人使住立不得然後進洞子向前填平壕便推天橋就城因以上城規即時令人於城上照賊填壕處相對用大木置起戰棚一座上下兩層其上横鋪大木三重及於城裏脚下深栽髙木棚一所以防賊人萬一上城後若便下城則必陷在棚中又於城上兩邊匝女頭墻宻用大木埋起髙排叉柱遮隔砲石又於戰棚南北各東西横埋排叉柱兩重柱外各分布長鎗手并斬馬刀又於柱外各東西更置戰棚一座棚上各備塼石弓箭以備賊人萬一上城分頭兩向沿城殺人及防戰棚上下人有不盡死禦敵者致於必死之地使之無不用命又於城裏相對賊定砲并填壕處亦立大砲七座内三座亦可施放砲石重三五十斤至五六十斤者又於砲架前并兩邊髙埋大木砲架中心拽砲人上横排木椓作砲棚遮隔賊砲每砲一座用砲手三人更互使用城上照料城内放出砲石逺近偏正一人城上戰棚下用大木兩條各長二丈四五横用括木兩條各長六尺當用横木一條長一丈造就托竿一所又以乾竹柴草造下火牛三百餘個又以大枋木三條合就長板一片約長一丈五尺有餘又以火砲藥造下長竹竿火鎗二十餘條撞槍鈎䥥各數條皆用兩人共持一條凖備天橋近城於戰棚上下使用又於兵衆中選用有膽勇人分為十四甲逐日輪當戰棚上下并排叉柱外及羊馬城外及凖備諸處𦂳急應援以安陸縣尉李居正統領又以副將馬立統領一項人兵専㸃檢四壁守禦及攻城𦂳處策應幸而其賊所置攻城器具前来一一皆如所料賊所立砲七座不住施放一十四晝夜雖打壊城上門樓并城門纔板及打折排叉柱并戰棚上横鋪木植但逐旋打壊逐旋添補立起並不曽正打著城上城内一人惟是城裏放砲出外逺近偏正有城上照砲人招呼令逐旋那移轉動砲架及添减拽砲人數或砲石大小施放所以城外賊人稍有攅聚砲力可及處即時打散其賊砲手并拽砲人多被打殺所有賊人狗脊洞子只於當日盡皆打倒并人亦打殺更不能使用惟有大洞子臨壕約中城内大砲三二百下方始打動上盖少有損壊其當面椓簾氊簾一齊打碎砲入洞子内打殺人多却推向前再修别無牛皮作簾并簾裏硬排立木又向前来再打損壊方推拽向後不用只擁驅擄到老少婦女搬運草木磚石填壕並不顧城上箭砲打殺若是打殺近上首領并親近正賊即䭾背或舁去窖埋若是打殺驅擄人并已下人即時剮肉食用其壕相近填滿方再以土傅城城上人併射火箭在所填草木上偶值風順其賊衆向前打撲不及被火燒著兩三晝夜尚未燒盡其賊又只用磚石並土相兼再填又兩三日相近填滿其老少婦女死損外見存無㡬兼近城脚難向前来遂選壯健人與正賊牙兵相兼以布袋盛土走夯向前来并布袋様下急走回去其搬運填壕并定砲拽砲及城下徃来之賊中箭并砲前後死損甚多其賊漸窘少闕糧食襄鄧隨郢四郡界内人民田種萬無一二回去亦難得食打刼已徧並無可刼除正賊近上甲頭人有些裝著餘人並籃縷惟指望打城後為飽煖之計所以其賊攻城亦不惜他人命用意堅確不肯輕退八月十五日宣撫使司送到襄鄧隨郢州鎮撫使司書寫機宜文字譚憲公文稱朝廷已差李横充襄鄧隨郢州鎮撫使又將譚憲文字付李横照騐横言便是朝廷差我做鎮撫使教我去那裏喫著甚底我也不能做得他鎮撫使我待打城破後相度十八日賊衆遂填平裏壕十九日四面分布打城賊安排下雲梯伺候同時下手及四外髙阜處及要路上各布馬軍凖備稍截城破走出之人至午時推天橋凑城西南角正是所填壕上於天橋兩邊擡雲梯三十餘座後布長槍手約一千餘人發喊並鉦鼓齊發及弓弩箭砲石一齊施放射打城上守禦人其天橋已是近城規即於城上戰棚脚下推長板出城頭數尺於板上併手推滚下大石於城外脚下打推天橋賊衆及推出托竿托柱天橋争一丈有餘不能到城其戰棚上下方欲施用火鎗撞鎗鈎鐮之次其天橋脚下人倒推并牽拽竹索人倒拽天橋急回約五十餘步方住得一時辰以上却向前来於天橋先行路稍近南行意欲閃避托竿無可行得近南地步丈尺稍多所填壕不甚實處致䧟住天橋東南前脚前来不得却向後拽人因人衆用力太多拽斷竹索進退不得致羊馬城内兵出與天橋下賊人用命鬭敵并城上磚石弓弩箭鑿城裏砲石并下移時方始殺退賊兵㝷於城上推下火牛柴草被羊馬城内人並出搬柴草積在天橋脚下焚之其天橋上并中隔内賊兵方始慌忙走下一齊退却并遶城四外賊兵各被城上守禦人施放弓弩塼砲射打退走棄下雲梯及向外髙阜處并要路上分布人馬一齊回寨其賊大敗當夜遁去契勘其賊初来之時止有五六千人自入府界百餘里驅擄人數甚衆皆以正賊監押收刈稲糓搬材木置造攻城器具後来收盡田稲并梨棗等及造就攻具一齊追收回寨併使打城共數實有一萬餘人雖人數不為甚多然所造攻具雄壯擺布施設次第似乎不用人力可敵兇㷔實為可畏加之城内人飢餓雜草木皮葉食之凡守禦六十五晝夜横之攻城也乆之不下一日遣人請議事規在城上見之横曰願得粟二百斛而去左右請勿與規曰我糧無㡬横来請是視我虚實不與即謂糧乏攻益力去愈緩與之則遁有日矣即送與之明日横衆攻城規坐城樓砲折足指容色不變圍益急糧不繼諸將請搥牛以食規曰殺牛代食敵聞之圍猝未解矣乃盡取酒務麴糵分給之仍搜家財得萬緡以犒軍横又遣人来云願得府之魁妓而後罷攻諸將曰城圍七十日矣以一婦人活一城之衆不亦可乎規曰使横即退是我以婦人求和况未必退乎其再来當斬妓首以遺之孝感縣令韓遹来告曰縣有粟百斛路絶不通規命乘風雨呵殿而来賊軍疑其有神不敢睥睨横以天橋鵝車逼城規曰技止此爾縱火焚之即退因歎曰使横更七日不解麴蘖亦盡矣湯璹字君寳潭州瀏陽人淳熙十四年進士授徳安府教授先是建炎間陳規守徳安屢經大冦皆應以閒暇於城上築鵲臺城外築羊馬城又於羊馬城外設木棚賊至輙敗後知順昌府府多儲粟計議司来起粟赴河上規請代以金帛已而金人圍城竟頼其粟以充軍食卒以破敵璹訪㝷其事編為建炎徳安守禦録紹熙四年璹除太學録表上其書右陳規守城法用於倉猝無備之中九攻九拒應敵無窮十萬百萬靡不退却程式具存剖析尤備凡沿邊守宰紬繹此書思過半矣守城録卷四
