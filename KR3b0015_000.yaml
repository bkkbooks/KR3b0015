  text: 欽定四庫全書子部二
  hash: sha256:7e32dae4903853b48f89828e61d4081cf4abc5e504c25d2bc384a1194cb036b2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3b0015_WYG_000-1a, image: WYG0727/WYG0727-0175a.png}
body:
  text: 提要守城録四卷兵家類臣等謹案守城録四卷宋右正議大夫陳規在德安禦冦事迹也規字元則密州安邱人中明法科靖康末金兵南下荆湖諸郡所在盜起規以安陸令攝守事連敗劇冦建炎元年除知德安府擢鎮撫使羣盜先後來攻隨機捍禦皆摧破去尋召赴行在又出知順昌與劉錡同却金兵又移知廬州兼淮西安撫使卒乾道中追封忠利智敏侯立廟德安事迹具宋史本傳是書凡分三種首為規所撰靖康朝野僉言後序朝野僉言本夏少曾作備載靖康時金人攻汴始末規在順昌見之痛當日大臣將帥捍禦失策因條列應變之術附於各條下謂之後序徐夢莘嘗採入北盟會編一百三十九卷中然其文與此大同小異疑傳録者有所刪潤也次曰守城機要亦規所作皆論城郭樓櫓制度及攻城備禦之方宋史本傳載規有攻守方略傳世疑即此書次曰建炎德安守禦録乃瀏陽湯璹所作璹淳熙十四年進士官德安教授尋訪規守城遺事作為此書紹熙四年除太學録乃表上之案規本傳載乾道八年詔刻規德安守城録頒天下為諸守將法藝文志亦别有劉荀建炎德安守禦録三卷而無璹書之名疑荀所撰者即乾道所頒之本璹書上於紹熙時距乾道已二十餘年或又據荀書而重加增定歟三書本各自為帙不知何人始併為一編觀書末識語則寧宗以後人所輯矣宋自靖康板蕩宇內淪胥規獨能支拄經年不可謂非善於備禦然此僅足為守一城乘一障者應變之圖而不足為有國有家者固圉之本當時編為程式原欲令沿邊肄習蘄保殘疆然至元師南下直破臨安為東京之續率未聞有一人登陴以抗敵者豈非本根先撥雖有守禦之術亦無所用歟伏讀睿題闡發精微抉汴梁喪敗之由申守在四夷之訓然後知保邦諶命自有常經區區輸攻墨守之技固其末務矣謹録存是帙以不沒規一事之長並恭録宸翰辨於簡端俾天下萬世知聖人之所見者大也乾隆四十六年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀御題陳規守城録攝篆德安固守城因而失事論東京陳規於靖康丙午攝德安府事羣盜王在等攻城規在城上問賊何因到此賊言東京已破規初不信逮賊遁遣人詣都城奏功始知城果陷因嘆當時身不在圍城中以效守禦並論官吏將帥應敵捍禦之失更因靖康朝野僉言於所載攻守各條下附以己見并為之序陳規屢禦應之暇守城機要備載陳規守德安事自城郭門墻樓櫓之制以及攻城備禦之方凡四十餘條極為詳備又載羣賊王在等攻德安未兩月而退張世李孝義四日引去楊進十六日引去孔彥舟三次皆不克而去董平三萬人即日敗去趙夀亦三日引去曹成李宏閲九月始引去桑仲夏邢尚孫羣賊閲三月引去李橫則六十五日引去前後應敵機宜紀載甚悉其後瀏陽人湯璹編為德安守禦録表上其書欲沿邉守宰共為紬繹其意固善夫陳規力保危城九遇賊至皆隨機應敵卒賴安全可謂長於守矣但此特施之郡邑用得其人或見功效然因幸遇小冦耳若宋靖康汴京之失則由於平時政事之乖違豈盡係臨事捍禦之踈略彼時即陳規果在圍城又安能救其敗亡之禍乎湯璹深知紀以精小縣傍州或可賴通都大邑轉難行四夷守在垂明訓逮迫臨衝禍早成
