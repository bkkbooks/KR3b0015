body:
  text: 守城録卷二陳規守城機要一城門舊制門外築甕城甕城上皆敵樓費用極多以禦尋常盜賊則可以遮隔箭鑿若禦敵人大炮則不可用須是除去甕城止於城門前離城五丈以來橫築護門墻使外不得見城門啓閉不敢輕視萬一敵人奔衝則城上以炮石向下臨之更於城門裏兩邉各離城二丈築墻長五六十步使外人乍入不知城門所在不可窺測縱使奔突入城亦是自投陷穽故城門不可依舊制也一護門墻只於城門前十步內橫築髙厚墻一堵亦設鵲臺髙二丈墻在鵲臺上髙一丈三尺腳厚八尺上收三尺兩頭遮過門三二丈所以遮隔衝突門之啓閉外不得知縱使突入墻內城上炮石雨下兩邉羊馬墻內可以夾擊一城門貴多不貴少貴開不貴閉城門既多且開稍得便利去處即出兵擊之夜則斫其營寨使之晝夜不得安息自然不敢近城立寨又須為牽制之計常使彼勞我逸又於大城多設暗門羊馬城多開門竇填壕作路以為突門大抵守城常為戰備有便利則急擊之一城門舊制皆有門樓别無機械不可禦敵須是兩層上層施徑弓弩可以射逺下層施刀鎗又為暗板有急則揭去注巨木石以碎攻門者門為三重却後一層如常制皆舊加厚次外一重門以徑四五寸堅實圎木鑿眼貫串以代板不必用鐡葉釘裹又外一重以木為柵施於護門墻之兩邉比之一樓一門大假濟事一城門外壕上舊制多設釣橋夲以防備奔衝遇有冦至拽起釣橋攻者不可越壕而來殊不知正礙城內出兵若放下釣橋然後出兵則城外必須先見得以為備若兵已出復拽起橋板則緩急難於退却茍為敵所逼逐往往溺於壕中此釣橋有害無益明矣止可於門前施機械使敵必不能入拆去釣橋只用實橋城內軍馬進退皆便外人皆懼城內出兵晝夜不敢自安一干戈板亦名兼板舊制用鐵葉釘裹置於城門之前城上用轆轤車放亦是防遏衝突其礙城出兵則與鈎橋無異既於城門裏外安置機械自可不用干戈板以為出兵快便之利一城身舊制多是四方攻城者往往先用攻角以其易為力也城角上皆有敵樓戰棚蓋是先為隄備茍不更改攻城者終是得利且以城之東南角言之若直自東南角攻則無足畏炮石力小則為敵樓棚所隔炮石力大即必過入城裏若攻城人於城東立炮則城上東西數十步人必不能立又於城南添一炮則城上南北數十步人亦不能立便可進上城之具此城角不可依舊制也須是將城角少縮向裏若攻東城即須近北立炮若攻南城則須近西立炮城上皆可用炮倒擊其後若正東南角立炮則城上無敵樓戰棚不可下手將城角縮向裏為利甚不可忽也一女頭墻舊制於城外邉約地六尺一個髙者不過五尺作山字樣兩女頭間留女口一個女頭上立狗腳木一條挂搭皮竹箆籬牌一片遮隔矢石若禦大炮全不濟事又女頭低小城外箭鑿可中守禦人頭靣須是於城上先築鵲臺髙二尺濶五尺鵲臺上再築墻髙六尺厚二尺自鵲臺向上一尺五寸留方眼一個眼濶一尺髙八寸一云方徑及尺相離三尺又置一個兩眼之間向上一尺又置一個狀如品字向上作平頭墻敵若登城只於方眼中施槍刀自可刺下方眼向上自有平頭墻即是常用箆籬牌挂搭不必臨時施設也更於鵲臺上靠墻每相去四寸立排叉木一條髙出女墻五尺橫用細木夾勒兩道或三道攻城者或能過品字眼亦不能到平頭墻上更兼墻上又有排叉木限隔若要越過排叉木必須用手攀緣則刀斧砍之鎗刃刺之無不顛仆守者用力甚少攻者必不得志也一馬靣舊制六十步一座跳出城外不減二丈濶狹隨地利不定兩邉直覷城腳其上皆有樓子所用木植甚多若要畢備須用氊皮挂搭然能遮隔大炮一為所擊無不倒者樓子既倒守禦人便不得安或謂須預備樓子隨即架立是未嘗經歷攻守者之言也樓子既倒敵必以炮石弓弩併力臨城雖損害人命至多亦不可架立今但只於馬靣上築髙厚墻中留品字空眼以備覘望又可通過鎗刀靠城身兩邉開兩小門下看城外可施禦捍之具墻內造瓦厦屋與守禦人避風雨遇有攻擊便拆去瓦厦屋靠墻立髙大排叉木用粗繩橫編若造笆相似任其攻擊必不能為害一城不必太髙太髙則積雨摧拓修築費力城靣不可太濶太濶則炮石落在城上緩急擊中守禦人城靣通鵲臺只可一丈五尺或一丈六尺髙可三丈或三丈五尺沿邉大郡城壁髙亦不過五丈濶不過二丈而已一羊馬墻舊制州郡或無之其有者亦皆低薄髙不過六尺厚不過三尺去城逺近各不相同全不可用蓋羊馬城之名本防冦賊逼逐人民入城權暫安泊羊馬而已故皆不以為意然捍禦冦攘為利甚漙當於大城之外城壕之裏去城三丈一云去城二丈築鵲臺髙二尺一云髙二三尺濶四尺臺上築墻髙八尺一云髙及一丈腳厚五尺一云厚及六尺上收三尺每一丈留空眼一個以備覘望遇有緩急即出兵在羊馬城裏作伏兵正是披城下寨仍不妨安泊羊馬不可去城太逺太逺則大城上拋甎不能過太近則不可運轉長鎗大凡攻城須填平壕方可到羊馬墻下使其攻破羊馬墻亦難為入入亦不能駐足攻者止能於所填壕上一路直進守者可於羊馬墻內兩下夾擊又大城上甎石如雨下擊則是一靣攻城三靣受敵城內又有小炮可施凡攻城器械皆不可直抵城腳攻計百出皆有以備之也一羊馬墻內須均量地步逺近安排叉木作排叉門分布安排人兵易於點檢兼防姦細入城一城郭舊制止是一重城外有壕或有低薄羊馬城者使善守者守之雖遇大敵攻計百出亦可退郤或不經歷攻守者忽遇大敵圍城不無畏怯須是先為隄備當於外壕裏修築髙厚羊馬墻與大城兩城相副即是一壕兩城更於大城裏開掘深濶裏壕上又築月城即是兩壕三城使攻城者皆是能者亦無可攻之理大抵城與壕水一重難攻如一重至若裏城裏壕則必不可犯計羊馬城與裏城裏壕之費亦不甚多若為永久之計實不可缺一修築裏城秪於裏壕垠上增築髙二丈以上上設護險墻下臨裏壕須濶五丈深二丈以上攻城者或能上大城則有裏壕阻隔更使能過裏壕則裏城亦不可上若此則不特可禦外敵亦可潛消內患裏城裏壕費用不多不可不設庶免臨急旋開築也一修城舊制多於城外腳下或臨壕栽丫叉木名為鹿角大為無益若城中人出至鹿角內壕外人施放弓弩鹿角不能遮隔若乘風用火可以燒毁不如除去為便也一今來修城制度止是在外州軍城池若是京都會府須於城內向裏量度逺近再於外修築一重其外安置營寨向裏更築一重作官府若此豈獨堅固而已哉內外之患無不革盡一攻城用雲梯是欲蟻附登城今女頭上既留品字眼又有排叉木又有羊馬墻重重限隔則雲梯雖多無足畏也一攻城用洞子止是遮隔城上箭鑿欲以搬運土木甎石填壘壕塹待其填平方進攻具或欲逼城􅼑掘今既有羊馬墻為之限隔則洞子亦自難用一對樓則與城上樓子髙下相對鵝車稍髙向前瞰城頭向下附城腳天橋與對樓無異止是於樓上用長板作腳道或摺疊翻在城上皆是登城之具今羊馬墻既有人守自可兩邊橫施器刃敵人别用撞竿與其他應急機械自不足畏大凡攻城用天橋鵝車對樓火車火箭皆欲使人驚畏有以備之則不能為害一攻城多填幔道有至三數條者髙與城等直逼城頭今羊馬墻中既有人拒敵又大城上拋擲甎石自然難近大城更照所填幔道於城內靠城腳急開裏壕垠上更築月城兩邊栽立排叉木大城上又起木棚置人於棚上又於欲來路上多設籖刺使能登城亦不能入城或能入城亦不能過裏壕縱過裏壕決不能過月城以幔道攻城者百無一二今所備如此亦何足畏凡攻城者有一策則以數策應之一攻城用大炮有重百斤以上者若用舊制樓櫓無有不被摧毁者今不用樓子則大炮已無所施兼城身與女頭皆厚實城外炮來力大則自城頭上過但令守禦人靠墻坐立自然不能害人力小則為墻所隔更於城裏亦用大炮與之相對施放兼用逺炮可及三百五十步外者以害用事首領蓋攻城必以驅虜脅從者在前首領及同惡者在後城內放炮在城上人照料偏正逺近自可取的萬一敵炮不攻馬靣只攻女頭急於女頭墻裏栽埋排叉木亦用大繩實編如笆相似向裏用斜柱撑槍炮石雖多亦難擊壞炮既不能害人天橋對樓鵝車幔道之類又皆有以備之則人心安固城無可破之理一攻守利器皆莫如炮攻者得用炮之術則城無不拔守者得用炮之術則可以制敵守城之炮不可安在城上只於城裏量逺近安頓城外不可得見可以取的每炮於城立一人専照斜直逺近令炮手定放小偏則移定炮人腳太偏則移動炮架太逺則減拽炮人太近則添拽炮人三兩炮間便可中物更在炮手出入腳步以大炮施小炮三及三百步外若欲摧毁攻具須用大炮若欲害用事首領及搬運人須用逺炮炮不厭多備若用炮得術城可必固其於制造炮架精巧處又在守城人工匠臨時增減製造炮梢須及時月夏以六月冬以十一月十二月採取櫟木檀木皆一生笋長成少枝節者置溝渠內淹浸百餘日或半年取出去皮窨乾用穩木上下自根至梢按捺如張盤新弓相似取略無損者然後用麻索生皮相間繫扎以防隂晴緩慢日晴則皮緊索緩隂雨則索堅皮緩若此繫扎可保無失一用炮摧毁攻具須用重百斤以上或五七十斤大炮若欲放逺須用小炮只黃泥為團每個乾重五斤輕重一般則打物有凖圓則可以放逺又泥團到地便碎不為敵人復放入城兼亦易辦雖是泥團若中人頭靣胸臆無不死者中人手足無不折跌也一城被圍閉城內務要安靜若城外有人攻擊城內驚擾種種不便須是將城內地步分定界分差人巡視遇有人逼城號令街巷不得往來非籍定係上城守禦及策應人不得輒上城在城上人不得輒下城過當防間不特可免驚惶亦可杜絶不虞
